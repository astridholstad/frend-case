<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valutakonverterer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Valutakonverterer</h1>
    
    <section class="converter">
      <div class="field">
        <label for="amount">Beløp</label>
        <input type="number" id="amount" value="100" min="0" step="any">
      </div>
 
      <div class="quick-amounts">
        <button type="button" data-amount="100">100</button>
        <button type="button" data-amount="500">500</button>
        <button type="button" data-amount="1000">1000</button>
      </div>
 
      <div class="currency-row">
        <div>
          <label for="from-currency">Fra</label>
          <select id="from-currency" disabled>
            <option>Laster...</option>
          </select>
        </div>
 
        <button type="button" id="swap-button" aria-label="Bytt fra og til-valuta" disabled>⇄</button>
 
        <div>
          <label for="to-currency">Til</label>
          <select id="to-currency" disabled>
            <option>Laster...</option>
          </select>
        </div>
      </div>
 
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="result" class="result"></div>
    </section>
  </main>
 
  <script src="app.js"></script>
</body>
</html>
